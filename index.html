<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับสมัครนักเรียน - โรงเรียนปากแพรกวิทยาคม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        
        /* Custom Tab Styles */
        .tab-active { border-bottom: 3px solid #ec4899; color: #ec4899; font-weight: 700; }
        .tab-inactive { color: #64748b; font-weight: 500; }
        .tab-inactive:hover { color: #3b82f6; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ec4899; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Input styling */
        .modern-input {
            width: 100%; padding: 0.6rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem;
            transition: all 0.3s; outline: none; background-color: #ffffff; font-size: 0.95rem;
        }
        .modern-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        
        /* Smooth remove animation */
        .fade-out { opacity: 0; transform: scale(0.95); transition: all 0.3s ease-out; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Custom Radio Button */
        .grade-radio:checked + div { border-color: var(--active-color); background-color: var(--active-bg); }
        .grade-radio:checked + div span { color: var(--active-color); }
        .grade-radio:checked + div .check-icon { opacity: 1; transform: scale(1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center items-start">

    <!-- === เปลี่ยน URL ตรงนี้ด้วย URL Web App ที่ Deploy ใหม่ === -->
    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNR0ii4qExiS9LBiDyiDLJA729GXUmlhEB3iaKopaMEVZLLTUjlj7llXinkr44lpzB/exec";
    </script>

    <div class="w-full max-w-5xl bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] overflow-hidden border border-slate-100">
        
        <!-- Header Gradient -->
        <div class="bg-gradient-to-r from-blue-600 via-blue-500 to-pink-500 text-white p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl"></div>
            <div class="absolute bottom-0 left-0 -mb-10 -ml-10 w-32 h-32 bg-white opacity-10 rounded-full blur-xl"></div>
            <h1 class="text-3xl md:text-4xl font-bold relative z-10 tracking-tight">ระบบบันทึกรายชื่อผู้สมัครเรียน</h1>
            <p class="text-lg mt-2 text-blue-50 font-medium relative z-10">โรงเรียนปากแพรกวิทยาคม</p>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex border-b border-slate-200 px-6 md:px-10 pt-6">
            <button onclick="switchTab('form')" id="tab-form" class="pb-4 px-2 tab-active focus:outline-none text-lg transition-colors duration-200">
                <span class="flex items-center gap-2">📝 ฟอร์มรับสมัคร</span>
            </button>
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="pb-4 px-2 tab-inactive focus:outline-none text-lg ml-8 transition-colors duration-200">
                <span class="flex items-center gap-2">📊 แดชบอร์ดสถิติ</span>
            </button>
        </div>

        <div class="p-6 md:p-10 bg-slate-50/50">
            
            <!-- ===================== ส่วนที่ 1: ฟอร์มรับสมัคร ===================== -->
            <div id="section-form" class="block animate-fade-in">
                
                <form id="regForm" onsubmit="submitForm(event)" class="max-w-3xl mx-auto">
                    <!-- Global Info -->
                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-blue-100 mb-6 relative overflow-hidden">
                        <div class="absolute right-0 top-0 w-32 h-32 bg-blue-50 rounded-bl-full opacity-50 z-0"></div>
                        <div class="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                            <!-- ผู้บันทึก -->
                            <div>
                                <label class="block text-sm font-semibold text-slate-500 mb-2">ชื่อผู้รับสมัคร (ครู/เจ้าหน้าที่) <span class="text-pink-500">*</span></label>
                                <input type="text" id="staffName" required placeholder="เช่น ครูสมปอง มุ่งมั่น" class="modern-input bg-slate-50 focus:bg-white w-full">
                            </div>

                            <!-- เลือกระดับชั้น -->
                            <div>
                                <label class="block text-sm font-semibold text-slate-500 mb-2">เลือกระดับชั้นที่กำลังบันทึก</label>
                                <div class="grid grid-cols-2 gap-3 mt-1">
                                    <label class="cursor-pointer relative" style="--active-color: #2563eb; --active-bg: #eff6ff;">
                                        <input type="radio" name="globalGrade" value="ม.1" checked onchange="updateFormDisplay()" class="grade-radio peer sr-only">
                                        <div class="rounded-xl border-2 border-slate-200 px-4 py-3 hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                                            <span class="font-bold text-slate-500 text-lg transition-colors">ม.1</span>
                                        </div>
                                    </label>
                                    <label class="cursor-pointer relative" style="--active-color: #db2777; --active-bg: #fdf2f8;">
                                        <input type="radio" name="globalGrade" value="ม.4" onchange="updateFormDisplay()" class="grade-radio peer sr-only">
                                        <div class="rounded-xl border-2 border-slate-200 px-4 py-3 hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                                            <span class="font-bold text-slate-500 text-lg transition-colors">ม.4</span>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- รายชื่อนักเรียน -->
                    <div id="students-container"></div>

                    <!-- ปุ่มเพิ่มคน -->
                    <button type="button" onclick="addStudentRow()" class="w-full py-4 border-2 border-dashed border-pink-300 rounded-2xl text-pink-500 font-semibold hover:bg-pink-50 transition-colors flex items-center justify-center gap-2 mb-8">
                        ➕ เพิ่มข้อมูลนักเรียนคนที่ <span id="next-student-num">2</span>
                    </button>
                    
                    <!-- Submit -->
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center relative overflow-hidden">
                        <div id="progressContainer" class="absolute top-0 left-0 w-full h-1 bg-slate-100 hidden">
                            <div id="progressBar" class="h-full bg-gradient-to-r from-blue-500 to-pink-500 w-0 transition-all duration-300"></div>
                        </div>
                        <button type="submit" id="submitBtn" class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-800 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition duration-300 w-full md:w-auto text-lg flex items-center justify-center mx-auto gap-3">
                            <span id="submitBtnText">บันทึกข้อมูล ม.1 ลงชีตทั้งหมด</span>
                        </button>
                        <div id="submitMsg" class="mt-4 text-sm font-medium hidden"></div>
                    </div>
                </form>
            </div>

            <!-- ===================== ส่วนที่ 2: แดชบอร์ด ===================== -->
            <div id="section-dashboard" class="hidden animate-fade-in bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <div id="loadingDash" class="text-center py-20 hidden">
                    <div class="loader mb-4"></div>
                    <p class="text-pink-500 font-medium mt-2">กำลังดึงข้อมูลจากระบบ...</p>
                </div>
                
                <div id="dashboardContent" class="hidden">
                    
                    <!-- แถบ Export ข้อมูล -->
                    <div class="bg-slate-800 p-5 rounded-2xl shadow-sm mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div>
                            <h3 class="font-bold text-white text-lg flex items-center gap-2">
                                📥 ส่งออกข้อมูล (Excel / CSV)
                            </h3>
                            <p class="text-slate-400 text-xs mt-1">ดาวน์โหลดข้อมูลผู้สมัครเพื่อนำไปใช้งานต่อ</p>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <select id="exportDateSelect" class="modern-input border-slate-600 bg-slate-700 text-white focus:border-pink-500 py-2">
                                <option value="all">ทุกวันที่รับสมัคร (ทั้งหมด)</option>
                                <!-- JS จะใส่วันที่ตรงนี้ -->
                            </select>
                            <button onclick="exportToCSV()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold px-6 py-2 rounded-xl shadow-lg whitespace-nowrap transition-transform active:scale-95">
                                ดาวน์โหลด
                            </button>
                        </div>
                    </div>

                    <!-- 1. Stats Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gradient-to-br from-blue-50 to-pink-50 p-6 rounded-3xl border border-pink-100 text-center shadow-sm">
                            <h3 class="text-slate-500 text-sm font-bold mb-2">ยอดสมัครรวมทั้งหมด</h3>
                            <p class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-pink-500" id="stat-total">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-blue-100 text-center shadow-sm">
                            <h3 class="text-slate-500 text-sm font-bold mb-2">ยอดสมัคร ม.1</h3>
                            <p class="text-5xl font-extrabold text-blue-600" id="stat-m1">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-pink-100 text-center shadow-sm">
                            <h3 class="text-slate-500 text-sm font-bold mb-2">ยอดสมัคร ม.4</h3>
                            <p class="text-5xl font-extrabold text-pink-500" id="stat-m4">0</p>
                        </div>
                    </div>
                    
                    <!-- 2. Charts -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div class="bg-slate-50 p-6 border border-slate-100 rounded-3xl">
                            <h3 class="text-lg font-bold text-slate-700 mb-6 text-center">สถิติผู้สมัครรายวัน</h3>
                            <div class="relative h-72 w-full"><canvas id="dailyChart"></canvas></div>
                        </div>
                        <div class="bg-slate-50 p-6 border border-slate-100 rounded-3xl">
                            <h3 class="text-lg font-bold text-slate-700 mb-6 text-center">สถิติโรงเรียนเดิม (Top 5)</h3>
                            <div class="relative h-72 w-full"><canvas id="schoolChart"></canvas></div>
                        </div>
                    </div>

                    <!-- 3. Timeline Grouped by Date -->
                    <div class="mt-12">
                        <h3 class="text-xl font-bold text-slate-700 border-b-2 border-slate-100 pb-2 mb-6">ข้อมูลการรับสมัครแยกตามวัน</h3>
                        <div id="applicants-timeline" class="space-y-6"></div>
                    </div>
                    
                    <div class="text-center mt-10">
                         <button onclick="loadDashboardData()" class="text-sm font-semibold text-white bg-slate-800 hover:bg-slate-700 py-2 px-6 rounded-full transition-colors inline-flex gap-2">
                            🔄 รีเฟรชข้อมูลล่าสุด
                         </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Global variables สำหรับเก็บข้อมูลไว้ Export
        let globalRawData = {}; 

        document.addEventListener('DOMContentLoaded', () => {
            addStudentRow();
            updateFormDisplay();
        });

        // ซ่อน/แสดง เฉพาะ ม.4 (สายการเรียน + นักเรียนเดิม)
        function updateFormDisplay() {
            const grade = document.querySelector('input[name="globalGrade"]:checked').value;
            document.getElementById('submitBtnText').innerText = `บันทึกข้อมูล ${grade} ลงชีตทั้งหมด`;
            document.getElementById('submitBtn').className = grade === 'ม.4' 
                ? "bg-gradient-to-r from-pink-500 to-pink-600 hover:from-pink-600 hover:to-pink-700 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition w-full md:w-auto text-lg flex items-center justify-center mx-auto gap-3"
                : "bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-4 px-10 rounded-2xl shadow-xl transition w-full md:w-auto text-lg flex items-center justify-center mx-auto gap-3";

            document.querySelectorAll('.m4-only-section').forEach(sec => {
                if (grade === 'ม.4') {
                    sec.classList.remove('hidden');
                    const select = sec.querySelector('select');
                    if(select) select.setAttribute('required', 'true');
                } else {
                    sec.classList.add('hidden');
                    const select = sec.querySelector('select');
                    if(select) { select.removeAttribute('required'); select.value = ""; }
                    const checkbox = sec.querySelector('input[type="checkbox"]');
                    if(checkbox) checkbox.checked = false;
                }
            });
        }

        function toggleAbilityOptions(checkboxId, optionsId) {
            const isChecked = document.getElementById(checkboxId).checked;
            document.getElementById(optionsId).classList.toggle('hidden', !isChecked);
            if(!isChecked) document.querySelectorAll(`#${optionsId} input[type="radio"]`).forEach(r => r.checked = false);
        }

        // เพิ่มแถวข้อมูลนักเรียน
        function addStudentRow() {
            const container = document.getElementById('students-container');
            const rowId = `student-row-${Date.now()}`;
            const abilityCheckId = `ability-check-${Date.now()}`;
            const abilityOptionsId = `ability-options-${Date.now()}`;
            
            const div = document.createElement('div');
            div.className = "student-row bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 relative";
            div.id = rowId;
            
            div.innerHTML = `
                <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
                    <div class="flex items-center gap-2">
                        <span class="row-number-badge bg-slate-800 text-white w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold"></span>
                        <h4 class="font-bold text-slate-700">ข้อมูลนักเรียน</h4>
                    </div>
                    <button type="button" onclick="removeStudentRow('${rowId}')" class="delete-btn text-red-400 hover:text-red-600 text-sm font-bold">ลบข้อมูลนี้</button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div class="md:col-span-1">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">เลขที่สมัคร *</label>
                        <input type="text" name="appNo" required class="modern-input bg-slate-50">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ชื่อ-นามสกุล *</label>
                        <input type="text" name="fullName" required class="modern-input bg-slate-50">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">จบจากโรงเรียนเดิม *</label>
                        <input type="text" name="prevSchool" required class="modern-input bg-slate-50">
                    </div>

                    <div class="md:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-5 mt-2 border-t border-slate-100 pt-4">
                        <!-- ความสามารถพิเศษ -->
                        <div>
                            <label class="flex items-center gap-2 cursor-pointer mb-2">
                                <input type="checkbox" id="${abilityCheckId}" name="hasAbility" class="w-4 h-4 text-purple-600 rounded" onchange="toggleAbilityOptions('${abilityCheckId}', '${abilityOptionsId}')">
                                <span class="text-sm font-bold text-slate-700">⭐ มีความสามารถพิเศษ</span>
                            </label>
                            <div id="${abilityOptionsId}" class="hidden bg-purple-50 p-3 rounded-xl border border-purple-100 mt-2">
                                <div class="grid grid-cols-2 gap-2">
                                    <label class="flex items-center gap-2"><input type="radio" name="abilityType_${rowId}" value="ดนตรี" class="text-purple-600"> <span class="text-sm">🎵 ดนตรี</span></label>
                                    <label class="flex items-center gap-2"><input type="radio" name="abilityType_${rowId}" value="กีฬา" class="text-purple-600"> <span class="text-sm">⚽ กีฬา</span></label>
                                    <label class="flex items-center gap-2"><input type="radio" name="abilityType_${rowId}" value="ภาษา" class="text-purple-600"> <span class="text-sm">🗣️ ภาษา</span></label>
                                    <label class="flex items-center gap-2"><input type="radio" name="abilityType_${rowId}" value="ศิลปะ" class="text-purple-600"> <span class="text-sm">🎨 ศิลปะ</span></label>
                                </div>
                            </div>
                        </div>

                        <!-- สายการเรียน และ ติ๊กนักเรียนเดิม (เฉพาะ ม.4) -->
                        <div class="m4-only-section hidden space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">📚 สายการเรียน (ม.4) *</label>
                                <select name="m4Track" class="modern-input bg-slate-50 border-teal-200 text-sm">
                                    <option value="">-- เลือกสายการเรียน --</option>
                                    <option value="เตรียมวิศวกรรมศาสตร์">เตรียมวิศวกรรมศาสตร์</option>
                                    <option value="นวัตกรรมการจัดการเกษตร">นวัตกรรมการจัดการเกษตร</option>
                                    <option value="ภาษาอังกฤษเพื่อการสื่อสารธุรกิจ">ภาษาอังกฤษเพื่อการสื่อสารธุรกิจ</option>
                                    <option value="การจัดการธุรกิจอาหาร">การจัดการธุรกิจอาหาร</option>
                                </select>
                            </div>
                            
                            <!-- Checkbox นักเรียนเดิม -->
                            <div class="bg-pink-50 p-3 rounded-xl border border-pink-100">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" name="isOldStudent" class="w-4 h-4 text-pink-600 rounded border-pink-300">
                                    <span class="text-sm font-bold text-pink-700">🏫 เป็นนักเรียนเดิมของโรงเรียนปากแพรกวิทยาคม</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
            updateRowNumbers();
            updateFormDisplay();
        }

        function removeStudentRow(rowId) {
            if (document.querySelectorAll('.student-row').length <= 1) return alert("ต้องมีอย่างน้อย 1 คนครับ");
            document.getElementById(rowId).remove();
            updateRowNumbers();
        }

        function updateRowNumbers() {
            const badges = document.querySelectorAll('.row-number-badge');
            badges.forEach((b, i) => b.textContent = i + 1);
            document.getElementById('next-student-num').textContent = badges.length + 1;
            const btns = document.querySelectorAll('.delete-btn');
            btns.forEach(btn => btn.style.display = btns.length > 1 ? 'block' : 'none');
        }

        function switchTab(tab) {
            ['form', 'dashboard'].forEach(t => {
                document.getElementById('section-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).className = "pb-4 px-2 tab-inactive text-lg";
            });
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).className = "pb-4 px-2 tab-active text-lg";
            if(tab === 'dashboard') loadDashboardData();
        }

        async function submitForm(e) {
            e.preventDefault();
            const staffName = document.getElementById('staffName').value;
            const selectedGrade = document.querySelector('input[name="globalGrade"]:checked').value; 
            const students = [];

            document.querySelectorAll('.student-row').forEach(row => {
                const abilityCheck = row.querySelector('input[name="hasAbility"]').checked;
                const checkedRadio = row.querySelector(`input[name="abilityType_${row.id}"]:checked`);
                const track = (selectedGrade === 'ม.4' && row.querySelector('select[name="m4Track"]')) ? row.querySelector('select[name="m4Track"]').value : "";
                
                // เช็คว่าเป็นนักเรียนเดิมหรือไม่
                const oldStudentCheck = row.querySelector('input[name="isOldStudent"]');
                const isOldStudent = (selectedGrade === 'ม.4' && oldStudentCheck && oldStudentCheck.checked) ? "นักเรียนเดิม" : (selectedGrade === 'ม.4' ? "นักเรียนใหม่" : "");

                students.push({
                    action: "submit", grade: selectedGrade, staffName: staffName,
                    appNo: row.querySelector('input[name="appNo"]').value,
                    fullName: row.querySelector('input[name="fullName"]').value,
                    prevSchool: row.querySelector('input[name="prevSchool"]').value,
                    ability: abilityCheck && checkedRadio ? checkedRadio.value : "",
                    track: track,
                    isOldStudent: isOldStudent
                });
            });

            const btn = document.getElementById('submitBtn'), msg = document.getElementById('submitMsg'), prog = document.getElementById('progressBar');
            btn.disabled = true; msg.classList.remove('hidden'); document.getElementById('progressContainer').classList.remove('hidden');
            
            let success = 0, fail = 0;
            for (let i = 0; i < students.length; i++) {
                prog.style.width = `${(i / students.length) * 100}%`;
                msg.innerHTML = `<span class="loader" style="width:14px;height:14px;"></span> กำลังบันทึก ${students[i].fullName}`;
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(students[i]) });
                    if((await res.json()).status === 'success') success++; else fail++;
                } catch (e) { fail++; }
            }

            prog.style.width = '100%'; btn.disabled = false;
            msg.innerHTML = fail === 0 ? `🎉 บันทึกสำเร็จ ${success} คน!` : `⚠️ สำเร็จ ${success}, <span class="text-red-500">ล้มเหลว ${fail}</span>`;
            msg.className = `mt-5 text-sm font-bold block p-4 rounded-xl border ${fail===0 ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-orange-50 text-orange-600 border-orange-200'}`;
            
            if (fail === 0) {
                document.getElementById('regForm').reset();
                document.getElementById('staffName').value = staffName; 
                document.querySelector(`input[value="${selectedGrade}"]`).checked = true;
                document.getElementById('students-container').innerHTML = ''; addStudentRow();
            }
            setTimeout(() => { document.getElementById('progressContainer').classList.add('hidden'); msg.classList.add('hidden'); }, 4000);
        }

        // Dashboard & Export Logic
        async function loadDashboardData() {
            document.getElementById('loadingDash').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('hidden');
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                const data = await res.json();
                
                globalRawData = data.applicantsByDate; // เก็บไว้สำหรับ Export
                populateExportSelect(globalRawData);

                document.getElementById('stat-m1').innerText = data.totalM1 || 0;
                document.getElementById('stat-m4').innerText = data.totalM4 || 0;
                document.getElementById('stat-total').innerText = (data.totalM1 || 0) + (data.totalM4 || 0);
                
                if(data.dailyStats) renderDailyChart(data.dailyStats);
                if(data.schoolStats) renderSchoolChart(data.schoolStats);
                renderTimeline(data.applicantsByDate);
                
                document.getElementById('loadingDash').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
            } catch (e) { document.getElementById('loadingDash').innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`; }
        }

        function populateExportSelect(dataByDate) {
            const select = document.getElementById('exportDateSelect');
            select.innerHTML = '<option value="all">ทุกวันที่รับสมัคร (ทั้งหมด)</option>';
            const dates = Object.keys(dataByDate || {}).sort((a,b)=>b.localeCompare(a));
            dates.forEach(d => {
                select.innerHTML += `<option value="${d}">เฉพาะวันที่ ${d}</option>`;
            });
        }

        // ฟังก์ชัน Export CSV
        function exportToCSV() {
            if(!globalRawData || Object.keys(globalRawData).length === 0) return alert("ไม่มีข้อมูลให้ดาวน์โหลด");
            
            const selectedDate = document.getElementById('exportDateSelect').value;
            let csvRows = [];
            // หัวตาราง
            csvRows.push(["วันที่", "เวลา", "ระดับชั้น", "เลขที่สมัคร", "ชื่อ-นามสกุล", "โรงเรียนเดิม", "ความสามารถพิเศษ", "สายการเรียน", "สถานะนักเรียน", "ผู้รับสมัคร"]);

            const datesToExport = selectedDate === 'all' ? Object.keys(globalRawData).sort() : [selectedDate];

            datesToExport.forEach(date => {
                ['ม.1', 'ม.4'].forEach(grade => {
                    const students = globalRawData[date][grade] || [];
                    // เรียงตามเวลา
                    students.reverse().forEach(s => {
                        csvRows.push([
                            s.dateStr, s.time, s.grade, s.appNo, s.fullName, s.prevSchool, 
                            s.ability || "-", s.track || "-", s.isOldStudent || "-", s.staffName
                        ]);
                    });
                });
            });

            // สร้างไฟล์ CSV รองรับภาษาไทย (BOM)
            let csvContent = "\uFEFF"; 
            csvRows.forEach(row => {
                let formattedRow = row.map(str => `"${String(str).replace(/"/g, '""')}"`).join(",");
                csvContent += formattedRow + "\r\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `ข้อมูลรับสมัคร_${selectedDate === 'all' ? 'ทั้งหมด' : selectedDate}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function renderTimeline(dataByDate) {
            const container = document.getElementById('applicants-timeline');
            container.innerHTML = '';
            if (!dataByDate || Object.keys(dataByDate).length === 0) return container.innerHTML = '<p class="text-center text-slate-400 py-10">ยังไม่มีข้อมูล</p>';

            Object.keys(dataByDate).sort((a,b)=>b.localeCompare(a)).forEach(date => {
                const m1 = dataByDate[date]["ม.1"] || [], m4 = dataByDate[date]["ม.4"] || [];
                container.innerHTML += `
                <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden mb-6">
                    <div class="bg-slate-50 px-6 py-3 border-b border-slate-200"><h4 class="font-bold">📅 วันที่ ${date} (รวม ${m1.length+m4.length} คน)</h4></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x border-slate-100">
                        <div class="p-4">
                            <h5 class="font-bold text-blue-600 mb-3">ม.1 (${m1.length} คน)</h5>
                            <div class="space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-2">${m1.map(s => htmlItem(s, 'blue')).join('')}</div>
                        </div>
                        <div class="p-4">
                            <h5 class="font-bold text-pink-600 mb-3">ม.4 (${m4.length} คน)</h5>
                            <div class="space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-2">${m4.map(s => htmlItem(s, 'pink')).join('')}</div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function htmlItem(s, color) {
            return `
            <div class="p-3 bg-white border border-slate-100 rounded-xl text-sm shadow-sm">
                <div class="flex justify-between font-bold text-slate-700"><span>${s.fullName}</span><span class="text-${color}-500">เลขที่ ${s.appNo}</span></div>
                <p class="text-xs text-slate-500 truncate mt-1">รร.เดิม: ${s.prevSchool}</p>
                <div class="flex gap-1 mt-2">
                    ${s.ability ? `<span class="text-[10px] bg-purple-100 text-purple-700 px-2 rounded">⭐ ${s.ability}</span>` : ''}
                    ${s.track ? `<span class="text-[10px] bg-teal-100 text-teal-700 px-2 rounded">📚 ${s.track}</span>` : ''}
                    ${s.isOldStudent === 'นักเรียนเดิม' ? `<span class="text-[10px] bg-pink-100 text-pink-700 px-2 rounded">🏫 เด็กเก่า</span>` : ''}
                </div>
            </div>`;
        }

        let dailyChartInstance = null, schoolChartInstance = null;
        Chart.defaults.font.family = "'Sarabun', sans-serif";

        function renderDailyChart(data) {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            const dates = Object.keys(data).sort();
            if(dailyChartInstance) dailyChartInstance.destroy();
            dailyChartInstance = new Chart(ctx, { 
                type: 'bar', 
                data: { labels: dates, datasets: [{ label: 'ม.1', data: dates.map(d=>data[d]["ม.1"]), backgroundColor: '#3b82f6' }, { label: 'ม.4', data: dates.map(d=>data[d]["ม.4"]), backgroundColor: '#ec4899' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderSchoolChart(data) {
            const ctx = document.getElementById('schoolChart').getContext('2d');
            const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,5);
            if(schoolChartInstance) schoolChartInstance.destroy();
            schoolChartInstance = new Chart(ctx, { 
                type: 'doughnut', 
                data: { labels: sorted.map(i=>i[0]), datasets: [{ data: sorted.map(i=>i[1]), backgroundColor: ['#3b82f6','#ec4899','#8b5cf6','#10b981','#f59e0b'] }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'right' } } }
            });
        }
    </script>
</body>
</html>
