<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรับสมัครนักเรียน - โรงเรียนปากแพรกวิทยาคม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f9ff; }
        
        /* Custom Tab Styles */
        .tab-active { border-bottom: 3px solid #db2777; color: #db2777; font-weight: 700; }
        .tab-inactive { color: #475569; font-weight: 500; }
        .tab-inactive:hover { color: #2563eb; }
        
        .loader { border: 3px solid #e0f2fe; border-top: 3px solid #ec4899; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Input styling */
        .modern-input {
            width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #e2e8f0; border-radius: 0.75rem;
            transition: all 0.3s; outline: none; background-color: #ffffff; font-size: 0.95rem; color: #1e293b;
        }
        .modern-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Custom Radio Button for Grade Selection */
        .grade-radio:checked + div { border-color: var(--active-color); background-color: var(--active-bg); box-shadow: 0 4px 14px var(--shadow-color); transform: translateY(-2px); }
        .grade-radio:checked + div span { color: var(--active-color); }
        .grade-option { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center items-start">

    <!-- === อย่าลืมเปลี่ยน URL ตรงนี้ด้วย URL Web App ของคุณ === -->
    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNR0ii4qExiS9LBiDyiDLJA729GXUmlhEB3iaKopaMEVZLLTUjlj7llXinkr44lpzB/exec";
    </script>

    <div class="w-full max-w-5xl bg-white rounded-[2rem] shadow-[0_10px_40px_rgba(30,58,138,0.08)] overflow-hidden border border-blue-50">
        
        <!-- Header Gradient -->
        <div class="bg-gradient-to-r from-blue-900 via-blue-600 to-pink-500 text-white p-10 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 -mt-10 -mr-10 w-48 h-48 bg-white opacity-10 rounded-full blur-2xl"></div>
            <div class="absolute bottom-0 left-0 -mb-10 -ml-10 w-32 h-32 bg-pink-300 opacity-20 rounded-full blur-xl"></div>
            <div class="flex justify-center items-center gap-3 mb-2 relative z-10">
                <span class="text-4xl">🎓</span>
                <h1 class="text-3xl md:text-4xl font-bold tracking-tight">ระบบรับสมัครนักเรียน</h1>
            </div>
            <p class="text-lg text-blue-100 font-medium relative z-10">โรงเรียนปากแพรกวิทยาคม</p>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex border-b border-slate-100 px-6 md:px-10 pt-6 bg-white">
            <button onclick="switchTab('form')" id="tab-form" class="pb-4 px-4 tab-active focus:outline-none text-lg transition-colors duration-200">
                <span class="flex items-center gap-2">📝 ฟอร์มบันทึกข้อมูล</span>
            </button>
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="pb-4 px-4 tab-inactive focus:outline-none text-lg ml-4 md:ml-8 transition-colors duration-200">
                <span class="flex items-center gap-2">📊 แดชบอร์ด & ดาวน์โหลด</span>
            </button>
        </div>

        <div class="p-6 md:p-10 bg-blue-50/30">
            
            <!-- ===================== ส่วนที่ 1: ฟอร์มรับสมัคร ===================== -->
            <div id="section-form" class="block animate-fade-in">
                
                <form id="regForm" onsubmit="submitForm(event)" class="max-w-4xl mx-auto">
                    <!-- Global Info Card -->
                    <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-blue-100 mb-8 relative overflow-hidden">
                        <div class="absolute right-0 top-0 w-40 h-40 bg-gradient-to-bl from-blue-100 to-transparent rounded-bl-full opacity-60 z-0"></div>
                        <div class="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                            <div>
                                <label class="block text-sm font-bold text-blue-900 mb-2 flex items-center gap-2">
                                    <span>👤</span> ชื่อผู้รับสมัคร (ครู/เจ้าหน้าที่) <span class="text-pink-500">*</span>
                                </label>
                                <input type="text" id="staffName" required placeholder="เช่น ครูสมปอง มุ่งมั่น" class="modern-input">
                            </div>

                            <div>
                                <label class="block text-sm font-bold text-blue-900 mb-2 flex items-center gap-2">
                                    <span>🏫</span> เลือกระดับชั้นที่กำลังบันทึก
                                </label>
                                <div class="grid grid-cols-2 gap-4 mt-1">
                                    <label class="cursor-pointer relative" style="--active-color: #2563eb; --active-bg: #eff6ff; --shadow-color: rgba(37, 99, 235, 0.15);">
                                        <input type="radio" name="globalGrade" value="ม.1" checked onchange="updateFormDisplay()" class="grade-radio peer sr-only">
                                        <div class="grade-option rounded-xl border-2 border-slate-200 px-4 py-3 hover:bg-slate-50 flex items-center justify-center gap-2 bg-white">
                                            <span class="font-bold text-slate-400 text-lg">ม.1</span>
                                        </div>
                                    </label>
                                    <label class="cursor-pointer relative" style="--active-color: #db2777; --active-bg: #fdf2f8; --shadow-color: rgba(219, 39, 119, 0.15);">
                                        <input type="radio" name="globalGrade" value="ม.4" onchange="updateFormDisplay()" class="grade-radio peer sr-only">
                                        <div class="grade-option rounded-xl border-2 border-slate-200 px-4 py-3 hover:bg-slate-50 flex items-center justify-center gap-2 bg-white">
                                            <span class="font-bold text-slate-400 text-lg">ม.4</span>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Container ใส่รายชื่อนักเรียน -->
                    <div id="students-container" class="space-y-6"></div>

                    <!-- ปุ่มเพิ่มคน -->
                    <button type="button" onclick="addStudentRow()" class="w-full py-4 border-2 border-dashed border-blue-300 rounded-2xl text-blue-600 font-bold hover:bg-blue-50 transition-colors flex items-center justify-center gap-2 mt-6 mb-8 bg-white">
                        <span>➕</span> เพิ่มข้อมูลนักเรียนคนที่ <span id="next-student-num">2</span>
                    </button>
                    
                    <!-- Submit Section -->
                    <div class="bg-white p-8 rounded-3xl shadow-lg border border-blue-50 text-center relative overflow-hidden">
                        <div id="progressContainer" class="absolute top-0 left-0 w-full h-1.5 bg-slate-100 hidden">
                            <div id="progressBar" class="h-full bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 w-0 transition-all duration-300"></div>
                        </div>
                        <button type="submit" id="submitBtn" class="bg-gradient-to-r from-blue-700 to-blue-600 hover:from-blue-800 hover:to-blue-700 text-white font-bold py-4 px-12 rounded-2xl shadow-[0_8px_20px_rgba(29,78,216,0.25)] transition-all duration-300 hover:-translate-y-1 w-full md:w-auto text-lg flex items-center justify-center mx-auto gap-3">
                            <span>💾</span> <span id="submitBtnText">บันทึกข้อมูล ม.1 ลงระบบ</span>
                        </button>
                        <div id="submitMsg" class="mt-4 text-sm font-medium hidden"></div>
                    </div>
                </form>
            </div>

            <!-- ===================== ส่วนที่ 2: แดชบอร์ด ===================== -->
            <div id="section-dashboard" class="hidden animate-fade-in">
                
                <div id="loadingDash" class="bg-white rounded-3xl p-16 text-center shadow-sm border border-slate-100 hidden">
                    <div class="loader mb-4 w-10 h-10 border-4 border-blue-100 border-top-blue-600"></div>
                    <p class="text-blue-600 font-bold mt-2 text-lg">กำลังประมวลผลข้อมูล...</p>
                </div>
                
                <div id="dashboardContent" class="hidden space-y-8">
                    
                    <!-- 📥 แถบ Export ข้อมูล -->
                    <div class="bg-gradient-to-br from-blue-900 to-blue-800 p-6 md:p-8 rounded-3xl shadow-xl flex flex-col lg:flex-row justify-between items-center gap-6 border border-blue-700 relative overflow-hidden">
                        <div class="absolute right-0 bottom-0 opacity-10 pointer-events-none text-9xl translate-y-1/4 translate-x-1/4">📊</div>
                        
                        <div class="text-center lg:text-left relative z-10">
                            <h3 class="font-bold text-white text-2xl flex items-center justify-center lg:justify-start gap-3">
                                <span class="bg-blue-700/50 p-2.5 rounded-xl shadow-inner text-xl">📥</span> ส่งออกข้อมูล (Export)
                            </h3>
                            <p class="text-blue-200 text-sm mt-2 font-medium">เลือกดาวน์โหลดไฟล์ Excel/CSV ตามวันที่และระดับชั้น</p>
                        </div>
                        
                        <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto relative z-10">
                            <select id="exportGradeSelect" class="modern-input border-blue-600 bg-blue-950/50 text-white focus:border-pink-500 py-3 px-4 rounded-xl backdrop-blur-sm cursor-pointer hover:bg-blue-900/50 transition">
                                <option value="all">📚 ทุกระดับชั้น</option>
                                <option value="ม.1">📘 เฉพาะ ม.1</option>
                                <option value="ม.4">🌸 เฉพาะ ม.4</option>
                            </select>
                            <select id="exportDateSelect" class="modern-input border-blue-600 bg-blue-950/50 text-white focus:border-pink-500 py-3 px-4 rounded-xl backdrop-blur-sm cursor-pointer hover:bg-blue-900/50 transition">
                                <option value="all">📅 ทุกวันที่รับสมัคร (ทั้งหมด)</option>
                            </select>
                            <button onclick="exportToCSV()" class="bg-gradient-to-r from-pink-500 to-pink-600 hover:from-pink-400 hover:to-pink-500 text-white font-bold px-8 py-3 rounded-xl shadow-[0_4px_15px_rgba(236,72,153,0.4)] whitespace-nowrap transition-all active:scale-95 flex items-center justify-center gap-2 border border-pink-400">
                                <span>ดาวน์โหลด</span> ⬇️
                            </button>
                        </div>
                    </div>

                    <!-- 📊 Stats Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-8 rounded-3xl border border-blue-50 text-center shadow-[0_4px_20px_rgba(0,0,0,0.03)] relative overflow-hidden group">
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 to-pink-500"></div>
                            <h3 class="text-slate-500 text-sm font-bold mb-3 flex justify-center items-center gap-2"><span class="text-lg">📈</span> ยอดสมัครรวมทั้งหมด</h3>
                            <p class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-pink-500 transition-transform group-hover:scale-105" id="stat-total">0</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border border-blue-50 text-center shadow-[0_4px_20px_rgba(0,0,0,0.03)] relative overflow-hidden group">
                            <div class="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                            <h3 class="text-slate-500 text-sm font-bold mb-3 flex justify-center items-center gap-2"><span class="text-lg">📘</span> ยอดสมัคร ม.1</h3>
                            <p class="text-6xl font-extrabold text-blue-600 transition-transform group-hover:scale-105" id="stat-m1">0</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border border-blue-50 text-center shadow-[0_4px_20px_rgba(0,0,0,0.03)] relative overflow-hidden group">
                            <div class="absolute top-0 left-0 w-full h-1 bg-pink-500"></div>
                            <h3 class="text-slate-500 text-sm font-bold mb-3 flex justify-center items-center gap-2"><span class="text-lg">🌸</span> ยอดสมัคร ม.4</h3>
                            <p class="text-6xl font-extrabold text-pink-500 transition-transform group-hover:scale-105" id="stat-m4">0</p>
                        </div>
                    </div>
                    
                    <!-- 📉 Charts -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white p-8 border border-blue-50 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
                            <h3 class="text-lg font-bold text-blue-900 mb-6 text-center flex items-center justify-center gap-2"><span>📅</span> สถิติผู้สมัครรายวัน</h3>
                            <div class="relative h-72 w-full"><canvas id="dailyChart"></canvas></div>
                        </div>
                        <div class="bg-white p-8 border border-blue-50 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
                            <h3 class="text-lg font-bold text-blue-900 mb-6 text-center flex items-center justify-center gap-2"><span>🏫</span> สถิติโรงเรียนเดิม (Top 5)</h3>
                            <div class="relative h-72 w-full"><canvas id="schoolChart"></canvas></div>
                        </div>
                    </div>

                    <!-- 📜 Timeline Grouped by Date -->
                    <div class="bg-white rounded-3xl p-8 border border-blue-50 shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
                        <div class="flex justify-between items-center border-b-2 border-slate-100 pb-4 mb-6">
                            <h3 class="text-xl font-bold text-blue-900 flex items-center gap-2"><span>📑</span> ข้อมูลผู้สมัครเรียงตามวัน</h3>
                            <button onclick="loadDashboardData()" class="text-sm font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 py-2.5 px-5 rounded-xl transition-colors flex items-center gap-2">
                                <span>🔄</span> รีเฟรชข้อมูล
                            </button>
                        </div>
                        <div id="applicants-timeline" class="space-y-6"></div>
                    </div>
                    
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script>
        let globalRawData = {}; 

        document.addEventListener('DOMContentLoaded', () => {
            addStudentRow();
            updateFormDisplay();
        });

        function updateFormDisplay() {
            const grade = document.querySelector('input[name="globalGrade"]:checked').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('submitBtnText');
            
            btnText.innerText = `บันทึกข้อมูล ${grade} ลงระบบ`;
            
            if (grade === 'ม.4') {
                btn.className = "bg-gradient-to-r from-pink-600 to-pink-500 hover:from-pink-700 hover:to-pink-600 text-white font-bold py-4 px-12 rounded-2xl shadow-[0_8px_20px_rgba(219,39,119,0.25)] transition-all duration-300 hover:-translate-y-1 w-full md:w-auto text-lg flex items-center justify-center mx-auto gap-3";
            } else {
                btn.className = "bg-gradient-to-r from-blue-700 to-blue-600 hover:from-blue-800 hover:to-blue-700 text-white font-bold py-4 px-12 rounded-2xl shadow-[0_8px_20px_rgba(29,78,216,0.25)] transition-all duration-300 hover:-translate-y-1 w-full md:w-auto text-lg flex items-center justify-center mx-auto gap-3";
            }

            document.querySelectorAll('.m4-only-section').forEach(sec => {
                if (grade === 'ม.4') {
                    sec.classList.remove('hidden');
                    const select = sec.querySelector('select');
                    if(select) select.setAttribute('required', 'true');
                } else {
                    sec.classList.add('hidden');
                    const select = sec.querySelector('select');
                    if(select) { select.removeAttribute('required'); select.value = ""; }
                    const checkbox = sec.querySelector('input[type="checkbox"]');
                    if(checkbox) checkbox.checked = false;
                }
            });
        }

        // ฟังก์ชันแสดง/ซ่อนช่องพิมพ์ความสามารถพิเศษอื่นๆ
        function toggleOtherInput(rowId, cb) {
            const input = document.getElementById(`other-ability-${rowId}`);
            if (cb.checked) {
                input.classList.remove('hidden');
                input.focus();
            } else {
                input.classList.add('hidden');
                input.value = '';
            }
        }

        function addStudentRow() {
            const container = document.getElementById('students-container');
            const rowId = `student-row-${Date.now()}`;
            
            const div = document.createElement('div');
            div.className = "student-row bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 relative";
            div.id = rowId;
            
            div.innerHTML = `
                <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-5">
                    <div class="flex items-center gap-3">
                        <span class="row-number-badge bg-blue-900 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shadow-md"></span>
                        <h4 class="font-bold text-blue-900 text-lg">ข้อมูลผู้สมัคร</h4>
                    </div>
                    <button type="button" onclick="removeStudentRow('${rowId}')" class="delete-btn text-pink-500 hover:text-pink-700 hover:bg-pink-50 px-3 py-1 rounded-lg transition text-sm font-bold flex items-center gap-1">
                        <span>🗑️</span> ลบ
                    </button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-slate-700 mb-2">เลขที่สมัคร *</label>
                        <input type="text" name="appNo" required class="modern-input bg-slate-50 focus:bg-white" placeholder="เช่น 001">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">ชื่อ-นามสกุล *</label>
                        <input type="text" name="fullName" required class="modern-input bg-slate-50 focus:bg-white" placeholder="ด.ช. / ด.ญ. / นาย / นางสาว">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-sm font-bold text-slate-700 mb-2">จบจากโรงเรียนเดิม *</label>
                        <input type="text" name="prevSchool" required class="modern-input bg-slate-50 focus:bg-white" placeholder="ระบุชื่อโรงเรียนเดิม">
                    </div>

                    <div class="md:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6 mt-2 border-t border-slate-100 pt-5">
                        
                        <!-- ความสามารถพิเศษ (เลือกได้มากกว่า 1) -->
                        <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                            <label class="block text-sm font-bold text-blue-900 mb-3 flex items-center gap-2">
                                <span>⭐</span> ความสามารถพิเศษ (เลือกได้มากกว่า 1)
                            </label>
                            
                            <!-- ตัวเลือกแบบ Checkbox -->
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                <label class="flex items-center gap-2 cursor-pointer hover:bg-blue-50 p-1.5 rounded-lg transition-colors">
                                    <input type="checkbox" class="ability-cb-${rowId} w-4 h-4 text-blue-600 rounded border-blue-300 focus:ring-blue-500" value="ดนตรี">
                                    <span class="text-sm font-medium text-slate-700">🎵 ดนตรี</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer hover:bg-blue-50 p-1.5 rounded-lg transition-colors">
                                    <input type="checkbox" class="ability-cb-${rowId} w-4 h-4 text-blue-600 rounded border-blue-300 focus:ring-blue-500" value="กีฬา">
                                    <span class="text-sm font-medium text-slate-700">⚽ กีฬา</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer hover:bg-blue-50 p-1.5 rounded-lg transition-colors">
                                    <input type="checkbox" class="ability-cb-${rowId} w-4 h-4 text-blue-600 rounded border-blue-300 focus:ring-blue-500" value="ภาษา">
                                    <span class="text-sm font-medium text-slate-700">🗣️ ภาษา</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer hover:bg-blue-50 p-1.5 rounded-lg transition-colors">
                                    <input type="checkbox" class="ability-cb-${rowId} w-4 h-4 text-blue-600 rounded border-blue-300 focus:ring-blue-500" value="ศิลปะ">
                                    <span class="text-sm font-medium text-slate-700">🎨 ศิลปะ</span>
                                </label>
                            </div>
                            
                            <!-- ช่องอื่นๆ -->
                            <div class="mt-2 pt-2 border-t border-blue-100/50 flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-4">
                                <label class="flex items-center gap-2 cursor-pointer hover:bg-blue-50 p-1.5 rounded-lg transition-colors shrink-0">
                                    <input type="checkbox" class="ability-cb-${rowId} w-4 h-4 text-blue-600 rounded border-blue-300 focus:ring-blue-500" value="อื่นๆ" onchange="toggleOtherInput('${rowId}', this)">
                                    <span class="text-sm font-medium text-slate-700">✨ อื่นๆ (ระบุ)</span>
                                </label>
                                <input type="text" id="other-ability-${rowId}" class="hidden modern-input py-1.5 px-3 text-sm w-full border-blue-200 focus:border-blue-400 bg-white" placeholder="โปรดระบุความสามารถพิเศษ...">
                            </div>
                        </div>

                        <!-- สายการเรียน (เฉพาะ ม.4 โทนสีชมพู) -->
                        <div class="m4-only-section hidden space-y-4">
                            <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-100">
                                <label class="block text-sm font-bold text-pink-900 mb-2">📚 สายการเรียน (ม.4) *</label>
                                <select name="m4Track" class="modern-input bg-white border-pink-200 focus:border-pink-500 text-sm shadow-sm">
                                    <option value="">-- เลือกสายการเรียน --</option>
                                    <option value="เตรียมวิศวกรรมศาสตร์">เตรียมวิศวกรรมศาสตร์</option>
                                    <option value="นวัตกรรมการจัดการเกษตร">นวัตกรรมการจัดการเกษตร</option>
                                    <option value="ภาษาอังกฤษเพื่อการสื่อสารธุรกิจ">ภาษาอังกฤษเพื่อการสื่อสารธุรกิจ</option>
                                    <option value="การจัดการธุรกิจอาหาร">การจัดการธุรกิจอาหาร</option>
                                </select>
                                
                                <div class="mt-4 pt-4 border-t border-pink-200/50">
                                    <label class="flex items-center gap-2 cursor-pointer hover:bg-pink-100/50 p-2 rounded-xl transition">
                                        <input type="checkbox" name="isOldStudent" class="w-5 h-5 text-pink-600 rounded border-pink-300 focus:ring-pink-500">
                                        <span class="text-sm font-bold text-pink-700">🏫 เป็นนักเรียนเดิม</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
            updateRowNumbers();
            updateFormDisplay();
        }

        function removeStudentRow(rowId) {
            if (document.querySelectorAll('.student-row').length <= 1) return alert("ต้องมีอย่างน้อย 1 คนครับ");
            document.getElementById(rowId).remove();
            updateRowNumbers();
        }

        function updateRowNumbers() {
            const badges = document.querySelectorAll('.row-number-badge');
            badges.forEach((b, i) => b.textContent = i + 1);
            document.getElementById('next-student-num').textContent = badges.length + 1;
            const btns = document.querySelectorAll('.delete-btn');
            btns.forEach(btn => btn.style.display = btns.length > 1 ? 'flex' : 'none');
        }

        function switchTab(tab) {
            ['form', 'dashboard'].forEach(t => {
                document.getElementById('section-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).className = "pb-4 px-4 tab-inactive text-lg";
            });
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).className = "pb-4 px-4 tab-active text-lg";
            if(tab === 'dashboard') loadDashboardData();
        }

        async function submitForm(e) {
            e.preventDefault();
            const staffName = document.getElementById('staffName').value;
            const selectedGrade = document.querySelector('input[name="globalGrade"]:checked').value; 
            const students = [];

            document.querySelectorAll('.student-row').forEach(row => {
                // รวบรวมความสามารถพิเศษทั้งหมดที่ถูกเลือก
                let abilities = [];
                row.querySelectorAll(`.ability-cb-${row.id}:checked`).forEach(cb => {
                    if (cb.value === 'อื่นๆ') {
                        const otherVal = document.getElementById(`other-ability-${row.id}`).value.trim();
                        if (otherVal) abilities.push(otherVal);
                    } else {
                        abilities.push(cb.value);
                    }
                });
                const finalAbilityStr = abilities.join(', '); // รวมข้อความเข้าด้วยกันคั่นด้วย ,

                const track = (selectedGrade === 'ม.4' && row.querySelector('select[name="m4Track"]')) ? row.querySelector('select[name="m4Track"]').value : "";
                const oldStudentCheck = row.querySelector('input[name="isOldStudent"]');
                const isOldStudent = (selectedGrade === 'ม.4' && oldStudentCheck && oldStudentCheck.checked) ? "นักเรียนเดิม" : (selectedGrade === 'ม.4' ? "นักเรียนใหม่" : "");

                students.push({
                    action: "submit", grade: selectedGrade, staffName: staffName,
                    appNo: row.querySelector('input[name="appNo"]').value,
                    fullName: row.querySelector('input[name="fullName"]').value,
                    prevSchool: row.querySelector('input[name="prevSchool"]').value,
                    ability: finalAbilityStr,
                    track: track,
                    isOldStudent: isOldStudent
                });
            });

            const btn = document.getElementById('submitBtn'), msg = document.getElementById('submitMsg'), prog = document.getElementById('progressBar');
            btn.disabled = true; msg.classList.remove('hidden'); document.getElementById('progressContainer').classList.remove('hidden');
            
            let success = 0, fail = 0;
            for (let i = 0; i < students.length; i++) {
                prog.style.width = `${(i / students.length) * 100}%`;
                msg.innerHTML = `<span class="loader" style="width:14px;height:14px;border-top-color:#1e3a8a;"></span> กำลังบันทึก ${students[i].fullName}`;
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(students[i]) });
                    if((await res.json()).status === 'success') success++; else fail++;
                } catch (e) { fail++; }
            }

            prog.style.width = '100%'; btn.disabled = false;
            msg.innerHTML = fail === 0 ? `🎉 บันทึกสำเร็จ ${success} คน!` : `⚠️ สำเร็จ ${success}, <span class="text-red-500">ล้มเหลว ${fail}</span>`;
            msg.className = `mt-5 text-base font-bold block p-4 rounded-xl border ${fail===0 ? 'bg-green-50 text-green-700 border-green-200' : 'bg-orange-50 text-orange-700 border-orange-200'}`;
            
            if (fail === 0) {
                document.getElementById('regForm').reset();
                document.getElementById('staffName').value = staffName; 
                document.querySelector(`input[value="${selectedGrade}"]`).checked = true;
                document.getElementById('students-container').innerHTML = ''; addStudentRow();
            }
            setTimeout(() => { document.getElementById('progressContainer').classList.add('hidden'); msg.classList.add('hidden'); }, 5000);
        }

        // Dashboard & Export Logic (เหมือนเดิมทั้งหมด)
        async function loadDashboardData() {
            document.getElementById('loadingDash').classList.remove('hidden');
            document.getElementById('dashboardContent').classList.add('hidden');
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                const data = await res.json();
                
                globalRawData = data.applicantsByDate;
                populateExportSelect(globalRawData);

                document.getElementById('stat-m1').innerText = data.totalM1 || 0;
                document.getElementById('stat-m4').innerText = data.totalM4 || 0;
                document.getElementById('stat-total').innerText = (data.totalM1 || 0) + (data.totalM4 || 0);
                
                if(data.dailyStats) renderDailyChart(data.dailyStats);
                if(data.schoolStats) renderSchoolChart(data.schoolStats);
                renderTimeline(data.applicantsByDate);
                
                document.getElementById('loadingDash').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
            } catch (e) { document.getElementById('loadingDash').innerHTML = `<p class="text-red-500 font-bold p-4">❌ ไม่สามารถดึงข้อมูลได้: ${e.message}</p>`; }
        }

        function populateExportSelect(dataByDate) {
            const select = document.getElementById('exportDateSelect');
            select.innerHTML = '<option value="all">📅 ทุกวันที่รับสมัคร (ทั้งหมด)</option>';
            const dates = Object.keys(dataByDate || {}).sort((a,b)=>b.localeCompare(a));
            dates.forEach(d => {
                select.innerHTML += `<option value="${d}">📍 เฉพาะวันที่ ${d}</option>`;
            });
        }

        function exportToCSV() {
            if(!globalRawData || Object.keys(globalRawData).length === 0) return alert("ไม่มีข้อมูลให้ดาวน์โหลด");
            
            const selectedDate = document.getElementById('exportDateSelect').value;
            const selectedGrade = document.getElementById('exportGradeSelect').value;
            
            let csvRows = [];
            csvRows.push(["วันที่", "เวลา", "ระดับชั้น", "เลขที่สมัคร", "ชื่อ-นามสกุล", "โรงเรียนเดิม", "ความสามารถพิเศษ", "สายการเรียน", "สถานะนักเรียน", "ผู้รับสมัคร"]);

            const datesToExport = selectedDate === 'all' ? Object.keys(globalRawData).sort() : [selectedDate];
            const gradesToExport = selectedGrade === 'all' ? ['ม.1', 'ม.4'] : [selectedGrade];

            let hasData = false;

            datesToExport.forEach(date => {
                gradesToExport.forEach(grade => {
                    const students = globalRawData[date][grade] || [];
                    if(students.length > 0) hasData = true;
                    students.reverse().forEach(s => {
                        csvRows.push([
                            s.dateStr, s.time, s.grade, s.appNo, s.fullName, s.prevSchool, 
                            s.ability || "-", s.track || "-", s.isOldStudent || "-", s.staffName
                        ]);
                    });
                });
            });

            if(!hasData) return alert("ไม่พบข้อมูลตามเงื่อนไขที่เลือกครับ");

            let csvContent = "\uFEFF"; 
            csvRows.forEach(row => {
                let formattedRow = row.map(str => `"${String(str).replace(/"/g, '""')}"`).join(",");
                csvContent += formattedRow + "\r\n";
            });

            const gradeText = selectedGrade === 'all' ? 'รวมทุกระดับชั้น' : selectedGrade;
            const dateText = selectedDate === 'all' ? 'ทั้งหมด' : selectedDate;

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `ข้อมูลรับสมัคร_${gradeText}_${dateText}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function renderTimeline(dataByDate) {
            const container = document.getElementById('applicants-timeline');
            container.innerHTML = '';
            if (!dataByDate || Object.keys(dataByDate).length === 0) return container.innerHTML = '<div class="text-center bg-slate-50 rounded-2xl p-10 text-slate-400 font-bold">📂 ยังไม่มีข้อมูลผู้สมัครในระบบ</div>';

            Object.keys(dataByDate).sort((a,b)=>b.localeCompare(a)).forEach(date => {
                const m1 = dataByDate[date]["ม.1"] || [], m4 = dataByDate[date]["ม.4"] || [];
                container.innerHTML += `
                <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
                    <div class="bg-blue-50/50 px-6 py-4 border-b border-blue-100 flex items-center gap-3">
                        <span class="bg-white p-2 rounded-lg shadow-sm">📅</span>
                        <h4 class="font-bold text-blue-900 text-lg">วันที่ ${date} <span class="text-sm font-normal text-slate-500 ml-2">(รวม ${m1.length+m4.length} คน)</span></h4>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x border-slate-100">
                        <div class="p-5 bg-blue-50/10">
                            <h5 class="font-bold text-blue-700 mb-4 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500"></span> ม.1 (${m1.length} คน)</h5>
                            <div class="space-y-3 max-h-60 overflow-y-auto custom-scrollbar pr-2">${m1.length ? m1.map(s => htmlItem(s, 'blue')).join('') : '<p class="text-sm text-slate-400">ไม่มีข้อมูล</p>'}</div>
                        </div>
                        <div class="p-5 bg-pink-50/10">
                            <h5 class="font-bold text-pink-600 mb-4 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-pink-500"></span> ม.4 (${m4.length} คน)</h5>
                            <div class="space-y-3 max-h-60 overflow-y-auto custom-scrollbar pr-2">${m4.length ? m4.map(s => htmlItem(s, 'pink')).join('') : '<p class="text-sm text-slate-400">ไม่มีข้อมูล</p>'}</div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function htmlItem(s, color) {
            const bgColor = color === 'blue' ? 'bg-white border-blue-100 hover:border-blue-300' : 'bg-white border-pink-100 hover:border-pink-300';
            const numColor = color === 'blue' ? 'text-blue-600 bg-blue-50' : 'text-pink-600 bg-pink-50';
            return `
            <div class="p-4 ${bgColor} border rounded-xl text-sm shadow-[0_2px_10px_rgba(0,0,0,0.02)] transition-colors">
                <div class="flex justify-between items-start font-bold text-slate-700 mb-1">
                    <span class="text-base">${s.fullName}</span>
                    <span class="${numColor} px-2 py-1 rounded-md text-xs">เลขที่ ${s.appNo}</span>
                </div>
                <p class="text-xs text-slate-500 truncate flex items-center gap-1"><span>🏫</span> รร.เดิม: ${s.prevSchool}</p>
                <div class="flex flex-wrap gap-1.5 mt-2.5">
                    ${s.ability ? `<span class="text-[10px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded-md font-medium">⭐ ${s.ability}</span>` : ''}
                    ${s.track ? `<span class="text-[10px] bg-teal-100 text-teal-700 px-2 py-0.5 rounded-md font-medium">📚 ${s.track}</span>` : ''}
                    ${s.isOldStudent === 'นักเรียนเดิม' ? `<span class="text-[10px] bg-pink-100 text-pink-700 px-2 py-0.5 rounded-md font-medium">🏫 เด็กเก่า</span>` : ''}
                </div>
            </div>`;
        }

        let dailyChartInstance = null, schoolChartInstance = null;
        Chart.defaults.font.family = "'Sarabun', sans-serif";
        Chart.defaults.color = "#64748b";

        function renderDailyChart(data) {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            const dates = Object.keys(data).sort();
            if(dailyChartInstance) dailyChartInstance.destroy();
            dailyChartInstance = new Chart(ctx, { 
                type: 'bar', 
                data: { 
                    labels: dates, 
                    datasets: [
                        { label: 'ม.1', data: dates.map(d=>data[d]["ม.1"]), backgroundColor: '#3b82f6', borderRadius: 6 }, 
                        { label: 'ม.4', data: dates.map(d=>data[d]["ม.4"]), backgroundColor: '#ec4899', borderRadius: 6 }
                    ] 
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, grid: { borderDash: [4, 4] } }, x: { grid: { display: false } } },
                    plugins: { legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } } }
                }
            });
        }

        function renderSchoolChart(data) {
            const ctx = document.getElementById('schoolChart').getContext('2d');
            const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,5);
            if(schoolChartInstance) schoolChartInstance.destroy();
            schoolChartInstance = new Chart(ctx, { 
                type: 'doughnut', 
                data: { 
                    labels: sorted.map(i=>i[0]), 
                    datasets: [{ data: sorted.map(i=>i[1]), backgroundColor: ['#1e3a8a', '#3b82f6', '#ec4899', '#fbcfe8', '#cbd5e1'], borderWidth: 2, borderColor: '#ffffff' }] 
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, cutout: '70%', 
                    plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8 } } } 
                }
            });
        }
    </script>
</body>
</html>
